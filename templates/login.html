<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login or Sign Up</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navbar (Outside the form) -->
    

    <!-- Page Content -->
    <div class="main-container">
        <div class="form-container">
            <h1 class="app-title">Mental Health Tracker</h1>

            <!-- Login Form -->
            <form id="login-form" class="form">
                <h3>Login</h3>
                <div class="form-group">
                    <label for="login-email">Email:</label>
                    <input type="email" id="login-email" class="input" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Password:</label>
                    <input type="password" id="login-password" class="input" required>
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
                <p class="toggle-text">Don't have an account? <a href="#" id="show-signup">Sign up</a></p>
            </form>

            <!-- Signup Form -->
            <form id="signup-form" class="form hidden">
                <h3>Sign Up</h3>
                <div class="form-group">
                    <label for="signup-email">Email:</label>
                    <input type="email" id="signup-email" class="input" required>
                </div>
                <div class="form-group">
                    <label for="signup-password">Password:</label>
                    <input type="password" id="signup-password" class="input" required>
                </div>
                <button type="submit" class="btn btn-success">Sign Up</button>
                <p class="toggle-text">Already have an account? <a href="#" id="show-login">Login</a></p>
            </form>
        </div>
    </div>

    <script src="/static/js/script.js"></script>
</body>
</html>
