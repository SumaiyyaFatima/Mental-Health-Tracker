<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress Report</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <h2>MENTAL HEALTH TRACKER</h2>
        <ul class="nav-links">
            <li><a href="/self_care">Home</a></li>
            <li><a href="/counselors">Counselors</a></li>
            <li><a href="/booking">Book a Session</a></li>
            
            <li><a href="/progress">Progress Report</a></li>
        </ul>
    </nav>

    <!-- Page Content -->
    <div class="main-container">
        <div class="content-container">
            <h1 class="app-title">Your Progress Report</h1>
            
            <!-- Mood Chart Section -->
            <div class="chart-container">
                <h2 class="section-title">Mood History</h2>
                <canvas id="progress-chart" width="400" height="200"></canvas>
            </div>

            <!-- Mood Summary Section -->
            <div class="summary-container">
                <h2 class="section-title">Mood Summary</h2>
                <ul id="mood-summary" class="tips-list">
                    <!-- Summary will be dynamically added here -->
                </ul>
            </div>

            <!-- Back Button -->
            <a href="/self_care" class="btn btn-secondary">Go Back</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/static/js/script.js"></script>
</body>
</html>
